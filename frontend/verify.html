<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verify OTP — SmartCrop AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body {
      background: #f4f7f6;
      font-family: "Poppins", sans-serif;
    }
    .card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }
    .btn-success {
      background: #157347;
      border: none;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark" style="background:#157347">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">SmartCrop AI</a>
    </div>
  </nav>

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card p-5" style="max-width:420px; width:100%;">
      <h4 class="text-center fw-bold mb-3">Login via OTP</h4>
      <p class="text-center text-muted mb-4">Verify your phone to continue</p>

      <div id="step1">
        <div class="mb-3">
          <label class="form-label">Phone Number</label>
          <input id="otpPhone" type="text" class="form-control" placeholder="6305020622" />
        </div>
        <button id="sendOtpBtn" class="btn btn-success w-100">Send OTP</button>
      </div>

      <div id="step2" style="display:none;">
        <div class="mb-3">
          <label class="form-label">Enter OTP</label>
          <input id="otpCode" type="text" class="form-control" placeholder="6-digit OTP" maxlength="6" />
        </div>
        <button id="verifyOtpBtn" class="btn btn-success w-100">Verify & Login</button>
      </div>

      <div id="msg" class="mt-3"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const msg = document.getElementById("msg");
    const step1 = document.getElementById("step1");
    const step2 = document.getElementById("step2");
    const phone = document.getElementById("otpPhone");
    const code = document.getElementById("otpCode");

    document.getElementById("sendOtpBtn")?.addEventListener("click", async () => {
      msg.innerHTML = "<div class='text-muted'>Sending OTP...</div>";
      try {
        const res = await fetch("/api/request-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone: phone.value.trim() })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Failed to send OTP");
        msg.innerHTML = `<div class='alert alert-success'>${data.message}</div>`;
        step1.style.display = "none";
        step2.style.display = "block";
      } catch (err) {
        msg.innerHTML = `<div class='alert alert-danger'>${err.message}</div>`;
      }
    });

    document.getElementById("verifyOtpBtn")?.addEventListener("click", async () => {
      msg.innerHTML = "<div class='text-muted'>Verifying...</div>";
      try {
        const res = await fetch("/api/verify-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone: phone.value.trim(), code: code.value.trim() })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Invalid OTP");
        msg.innerHTML = "<div class='alert alert-success'>Verification successful!</div>";
        setTimeout(() => (window.location.href = data.redirect || "/dashboard"), 700);
      } catch (err) {
        msg.innerHTML = `<div class='alert alert-danger'>${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
