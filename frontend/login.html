<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | SmartCrop AI</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      font-family: "Poppins", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      height: 100vh;
    }

    .page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
    }

    .left {
      background: linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.45)),
      url(https://nufarm.com/ca/wp-content/uploads/sites/16/2018/06/Farmer-in-Canola-Field-at-Sunset-Alamy-Stock-Image.jpg)
      center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 40px;
      text-align: center;
    }

    .left h1 {
      font-weight: 800;
      text-shadow: 0 4px 12px rgba(0,0,0,.6);
    }

    .left p {
      opacity: 0.95;
      max-width: 420px;
      margin: 0 auto;
    }

    .right {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e8f5e9, #d0f0f4);
    }

    .login-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      padding: 45px 40px;
      width: 100%;
      max-width: 430px;
      text-align: center;
    }

    h4 {
      font-weight: 700;
      color: #006b4f;
    }

    .btn-success {
      background: #006b4f;
      border: none;
    }

    .btn-success:hover {
      background: #004f38;
    }

    a.link {
      color: #006b4f;
      font-weight: 500;
      text-decoration: none;
    }

    a.link:hover {
      text-decoration: underline;
    }

    footer {
      position: absolute;
      bottom: 15px;
      width: 100%;
      text-align: center;
      color: #6c757d;
      font-size: 0.9rem;
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }
      .left {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- LEFT IMAGE PANEL -->
    <div class="left">
      <div>
        <h1>Empowering Farmers</h1>
        <p>
          SmartCrop AI helps farmers make better decisions using real-time data,
          disease prediction, and smart crop advisory.
        </p>
      </div>
    </div>

    <!-- RIGHT LOGIN FORM -->
    <div class="right">
      <div class="login-card">
        <h4 class="mb-2">Sign In</h4>
        <p class="text-muted mb-4">Login to manage your smart agriculture dashboard</p>

        <form id="loginForm">
          <div class="form-floating mb-3">
            <input id="phone" type="tel" class="form-control" placeholder="Phone Number" required />
            <label for="phone">Phone Number</label>
          </div>

          <div class="form-floating mb-3">
            <input id="password" type="password" class="form-control" placeholder="Password" required />
            <label for="password">Password</label>
          </div>

          <button type="submit" class="btn btn-success w-100 py-2">Login</button>
        </form>

        <div id="msg" class="mt-3"></div>

        <p class="mt-4 mb-0">
          Don’t have an account?
          <a href="/register" class="link">Create one</a>
        </p>
        <p class="mb-0 mt-2">
          <a href="/" class="link">← Back to Home</a>
        </p>
      </div>
    </div>

  </div>

  <footer>
    © <span id="year"></span> SmartCrop AI — Empowering Smart Agriculture
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
    const msg = document.getElementById("msg");

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.innerHTML = "<div class='text-muted'>Logging in...</div>";

      const phone = document.getElementById("phone").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!phone || !password) {
        msg.innerHTML = "<div class='alert alert-warning'>Please enter both phone and password.</div>";
        return;
      }

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone, password }),
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || "Login failed");
        msg.innerHTML = "<div class='alert alert-success'>✅ Login successful!</div>";
        setTimeout(() => (window.location.href = data.redirect || "/dashboard"), 1200);
      } catch (err) {
        msg.innerHTML = `<div class='alert alert-danger'>${err.message}</div>`;
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
