<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | SmartCrop </title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body {
      margin: 0;
      font-family: "Poppins", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      height: 100vh;
    }

    .page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
    }

    .left {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f6fbf8;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 12px 28px rgba(0,0,0,.08);
      border: none;
    }

    h4 { font-weight: 800; color: #0f5132; }
    .subtitle { color: #6c757d; font-size: 0.95rem; }

    .btn-main {
      background: #0f5132; color: #fff;
      border-radius: 999px; border: none; padding: 10px 18px;
    }
    .btn-main:hover { background: #0b3f27; }

    .right {
      background: linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.45)),
      url("https://images.unsplash.com/photo-1501004318641-b39e6451bec6?q=80&w=1600&auto=format&fit=crop")
      center/cover no-repeat;
      display: flex; align-items: center; justify-content: center;
      color: #fff; padding: 40px; text-align: center;
    }

    .right h1 { font-weight: 800; text-shadow: 0 4px 12px rgba(0,0,0,.6); }
    .right p { opacity: 0.95; max-width: 420px; margin: 0 auto; }

    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; }
      .right { display: none; }
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="left">
      <div class="card text-center">

        <h4 class="mb-1">Create Account</h4>
        <p class="subtitle mb-4">Register with phone & OTP</p>

        <form id="registerForm">
          <!-- Username -->
          <div class="form-floating mb-3">
            <input type="text" class="form-control" id="username" placeholder="Username" required>
            <label>Username</label>
          </div>

          <!-- Phone -->
          <div class="form-floating mb-3">
            <input type="tel" class="form-control" id="phone" placeholder="Phone Number" required>
            <label>Phone Number</label>
          </div>

          <!-- Password -->
          <div class="form-floating mb-3">
            <input type="password" class="form-control" id="password" placeholder="Password" required>
            <label>Password</label>
          </div>

          <!-- OTP -->
          <div class="form-floating mb-3 d-none" id="otpBox">
            <input type="text" class="form-control" id="otp" placeholder="Enter OTP">
            <label>OTP</label>
          </div>

          <button type="submit" class="btn btn-main w-100 mb-2" id="sendOtpBtn">
            Send OTP
          </button>

          <button type="button" class="btn btn-main w-100 d-none" id="verifyBtn">
            Verify OTP & Register
          </button>
        </form>

        <div id="msg" class="mt-3"></div>

        <p class="mt-4">
          Already have an account?
          <a href="/login" class="fw-semibold text-success text-decoration-none">Login</a>
        </p>
      </div>
    </div>

    <div class="right">
      <div>
        <h1>Grow with Confidence.</h1>
        <p>
          Join SmartCrop AI to predict diseases and protect your crops using smart advisory.
        </p>
      </div>
    </div>

  </div>

  <script>
    const form = document.getElementById("registerForm");
    const msg = document.getElementById("msg");
    const otpBox = document.getElementById("otpBox");
    const sendBtn = document.getElementById("sendOtpBtn");
    const verifyBtn = document.getElementById("verifyBtn");

    let tempOtp = null;

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      tempOtp = Math.floor(100000 + Math.random() * 900000).toString();
      console.log("OTP (demo):", tempOtp);

      msg.innerHTML = `<div class="alert alert-success">OTP sent (check console for demo)</div>`;
      otpBox.classList.remove("d-none");
      sendBtn.classList.add("d-none");
      verifyBtn.classList.remove("d-none");
    });

    verifyBtn.addEventListener("click", async () => {
      const username = document.getElementById("username").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const password = document.getElementById("password").value.trim();
      const otp = document.getElementById("otp").value.trim();

      if (otp !== tempOtp) {
        msg.innerHTML = `<div class="alert alert-danger">Invalid OTP</div>`;
        return;
      }

      const res = await fetch("/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, phone, password })
      });

      const data = await res.json();
      if (res.ok) {
        msg.innerHTML = `<div class="alert alert-success">Account created successfully</div>`;
        setTimeout(() => window.location.href = "/login", 1500);
      } else {
        msg.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
      }
    });
  </script>
</body>
</html>
